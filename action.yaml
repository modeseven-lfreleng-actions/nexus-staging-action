---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2026 The Linux Foundation

# nexus-staging-action
name: '🚀 Nexus Staging'
description: 'Manage Sonatype Nexus staging repository lifecycle'

inputs:
  nexus-server:
    description: 'Nexus server URL (e.g., https://nexus.opendaylight.org)'
    required: true
  nexus-username:
    description: 'Nexus username for authentication'
    required: true
  nexus-password:
    description: 'Nexus password for authentication'
    required: true
  staging-profile-id:
    description: 'Nexus staging profile ID (per-project)'
    required: true
  mode:
    description: 'Operation mode: stage, close, release, drop'
    required: true
    default: 'stage'
  m2repo-path:
    description: 'Path to local Maven repo directory (for stage mode)'
    required: false
    default: 'm2repo'
  staging-repo-id:
    description: 'Existing staging repo ID (for close/release/drop modes)'
    required: false
    default: ''
  staging-repo-file:
    description: >
      Path to a staging-repo.txt file listing one or more staging repos
      (one "REPO_ID REPO_URL" per line, as written by stage mode). When set,
      close/release/drop operate on every repo in the file. Mirrors the JJB
      behaviour of releasing all repos listed in staging-repo.txt.
    required: false
    default: ''
  dry-run:
    description: >
      When 'true', verify the staging repo(s) exist but do NOT perform the
      mutating operation (no close/release/drop). Mirrors JJB DRY_RUN.
    required: false
    default: 'false'
  description:
    description: 'Description for the staging repository'
    required: false
    default: 'GitHub Actions staging'

outputs:
  staging_repo_id:
    description: 'Staging repository ID'
    value: ${{ steps.nexus.outputs.staging_repo_id }}
  staging_repo_url:
    description: 'Staging repository URL'
    value: ${{ steps.nexus.outputs.staging_repo_url }}

runs:
  using: 'composite'
  steps:
    - name: 'Validate inputs'
      shell: bash
      env:
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_M2REPO_PATH: ${{ inputs.m2repo-path }}
        INPUT_STAGING_REPO_ID: ${{ inputs.staging-repo-id }}
        INPUT_STAGING_REPO_FILE: ${{ inputs.staging-repo-file }}
        INPUT_DRY_RUN: ${{ inputs.dry-run }}
      run: |
        # SPDX-License-Identifier: Apache-2.0
        set -euo pipefail

        echo "---> nexus-staging: Validating inputs"

        case "$INPUT_MODE" in
          stage|close|release|drop)
            ;;
          promote)
            echo "::warning::mode 'promote' is deprecated; use 'release'"
            ;;
          *)
            echo "::error::Invalid mode: $INPUT_MODE" \
              "(must be: stage, close, release, drop)"
            exit 1
            ;;
        esac

        case "$INPUT_DRY_RUN" in
          true|false) ;;
          *)
            echo "::error::Invalid dry-run: $INPUT_DRY_RUN (must be true/false)"
            exit 1
            ;;
        esac

        if [ "$INPUT_MODE" = "stage" ]; then
          if [ ! -d "$INPUT_M2REPO_PATH" ]; then
            echo "::error::m2repo-path directory not found: $INPUT_M2REPO_PATH"
            exit 1
          fi
          FILE_COUNT=$(find "$INPUT_M2REPO_PATH" -type f | wc -l)
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "::error::m2repo-path is empty: $INPUT_M2REPO_PATH"
            exit 1
          fi
          echo "INFO: Found $FILE_COUNT files in $INPUT_M2REPO_PATH"
        fi

        if [ "$INPUT_MODE" != "stage" ]; then
          if [ -z "$INPUT_STAGING_REPO_ID" ] \
              && [ -z "$INPUT_STAGING_REPO_FILE" ]; then
            echo "::error::staging-repo-id or staging-repo-file is required" \
              "for mode: $INPUT_MODE"
            exit 1
          fi
          if [ -n "$INPUT_STAGING_REPO_FILE" ] \
              && [ ! -f "$INPUT_STAGING_REPO_FILE" ]; then
            echo "::error::staging-repo-file not found:" \
              "$INPUT_STAGING_REPO_FILE"
            exit 1
          fi
        fi

    - name: 'Execute Nexus staging operation'
      id: nexus
      shell: bash
      env:
        INPUT_NEXUS_SERVER: ${{ inputs.nexus-server }}
        INPUT_NEXUS_USERNAME: ${{ inputs.nexus-username }}
        INPUT_NEXUS_PASSWORD: ${{ inputs.nexus-password }}
        INPUT_STAGING_PROFILE_ID: ${{ inputs.staging-profile-id }}
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_M2REPO_PATH: ${{ inputs.m2repo-path }}
        INPUT_STAGING_REPO_ID: ${{ inputs.staging-repo-id }}
        INPUT_STAGING_REPO_FILE: ${{ inputs.staging-repo-file }}
        INPUT_DRY_RUN: ${{ inputs.dry-run }}
        INPUT_DESCRIPTION: ${{ inputs.description }}
      run: |
        # SPDX-License-Identifier: Apache-2.0
        set -euo pipefail

        echo "---> nexus-staging: mode=$INPUT_MODE"

        # Back-compat: 'promote' is the deprecated alias for 'release'
        if [ "$INPUT_MODE" = "promote" ]; then
          INPUT_MODE="release"
        fi

        # Mask credentials
        echo "::add-mask::${INPUT_NEXUS_PASSWORD}"

        NEXUS_SERVER="${INPUT_NEXUS_SERVER%/}"
        AUTH="${INPUT_NEXUS_USERNAME}:${INPUT_NEXUS_PASSWORD}"
        PROFILE_ID="${INPUT_STAGING_PROFILE_ID}"
        STAGING_API="${NEXUS_SERVER}/service/local/staging"

        # Build list of staging repo IDs from explicit id and/or file.
        # The file format matches stage-mode output: "REPO_ID REPO_URL".
        build_repo_ids() {
            REPO_IDS=()
            if [ -n "${INPUT_STAGING_REPO_ID}" ]; then
                REPO_IDS+=("${INPUT_STAGING_REPO_ID}")
            fi
            if [ -n "${INPUT_STAGING_REPO_FILE}" ]; then
                while IFS= read -r line || [ -n "$line" ]; do
                    # First whitespace-delimited field is the repo ID
                    rid="$(echo "$line" | awk '{print $1}')"
                    [ -n "$rid" ] && REPO_IDS+=("$rid")
                done < "${INPUT_STAGING_REPO_FILE}"
            fi
            if [ "${#REPO_IDS[@]}" -eq 0 ]; then
                echo "::error::No staging repo IDs resolved"
                exit 1
            fi
        }

        # ─── STAGE MODE ────────────────────────────────────────
        if [ "$INPUT_MODE" = "stage" ]; then
            echo "INFO: Creating staging repository..."

            # Step 1: Create staging repo
            XML_DATA="<promoteRequest><data>"
            XML_DATA+="<description>"
            XML_DATA+="${INPUT_DESCRIPTION}"
            XML_DATA+="</description>"
            XML_DATA+="</data></promoteRequest>"
            CREATE_RESPONSE=$(curl -sf -u "$AUTH" \
                -H "Content-Type: application/xml" \
                -H "Accept: application/xml" \
                -d "$XML_DATA" \
                "${STAGING_API}/profiles/${PROFILE_ID}/start")

            REPO_ID=$(echo "$CREATE_RESPONSE" \
                | grep -oP \
                '<stagedRepositoryId>\K[^<]+' \
                || echo "$CREATE_RESPONSE" \
                | sed -n \
                's/.*<stagedRepositoryId>\(.*\)<\/stagedRepositoryId>.*/\1/p')

            if [ -z "$REPO_ID" ]; then
                echo "::error::Failed to create staging repository"
                echo "Response: $CREATE_RESPONSE"
                exit 1
            fi
            echo "INFO: Staging repository ${REPO_ID} created"

            # Step 2: Upload artifacts
            DEPLOY_URL="${NEXUS_SERVER}/service/local/staging"
            DEPLOY_URL+="/deployByRepositoryId/${REPO_ID}"
            UPLOAD_COUNT=0
            UPLOAD_FAIL=0

            while IFS= read -r -d '' file; do
                rel_path="${file#${INPUT_M2REPO_PATH}/}"
                if curl -sf -u "$AUTH" \
                    --upload-file "$file" \
                    "${DEPLOY_URL}/${rel_path}"; then
                    UPLOAD_COUNT=$((UPLOAD_COUNT + 1))
                else
                    echo "::warning::Failed to upload: $rel_path"
                    UPLOAD_FAIL=$((UPLOAD_FAIL + 1))
                fi
            done < <(find "$INPUT_M2REPO_PATH" -type f -print0)

            echo "INFO: Uploaded ${UPLOAD_COUNT} files" \
                "(${UPLOAD_FAIL} failures)"

            if [ "$UPLOAD_FAIL" -gt 0 ] && [ "$UPLOAD_COUNT" -eq 0 ]; then
                echo "::error::All uploads failed"
                exit 1
            fi

            # Step 3: Close staging repo
            echo "INFO: Closing staging repository" \
                "${REPO_ID}..."
            CLOSE_XML="<promoteRequest><data>"
            CLOSE_XML+="<stagedRepositoryId>"
            CLOSE_XML+="${REPO_ID}"
            CLOSE_XML+="</stagedRepositoryId>"
            CLOSE_XML+="<description>"
            CLOSE_XML+="Close: ${INPUT_DESCRIPTION}"
            CLOSE_XML+="</description>"
            CLOSE_XML+="</data></promoteRequest>"
            curl -sf -u "$AUTH" \
                -H "Content-Type: application/xml" \
                -d "$CLOSE_XML" \
                "${STAGING_API}/profiles/${PROFILE_ID}/finish"

            echo "INFO: Staging repository ${REPO_ID} closed"

            REPO_URL="${NEXUS_SERVER}/content/repositories/${REPO_ID}"

            # Write staging-repo.txt (same format as JJB)
            mkdir -p "${GITHUB_WORKSPACE}/archives"
            echo "${REPO_ID} ${REPO_URL}" \
                | tee -a "${GITHUB_WORKSPACE}/archives/staging-repo.txt"

            # Set outputs
            echo "staging_repo_id=${REPO_ID}" >> "$GITHUB_OUTPUT"
            echo "staging_repo_url=${REPO_URL}" >> "$GITHUB_OUTPUT"

            # Summary
            {
                echo "## Nexus Staging Complete ✅"
                echo ""
                echo "| | |"
                echo "|---|---|"
                echo "| **Mode** | stage |"
                echo "| **Repo ID** | \`${REPO_ID}\` |"
                echo "| **Repo URL** | ${REPO_URL} |"
                echo "| **Files Uploaded** | ${UPLOAD_COUNT} |"
                echo "| **Upload Failures** | ${UPLOAD_FAIL} |"
            } >> "$GITHUB_STEP_SUMMARY"

        # ─── RELEASE MODE (release closed repos) ──────────────────
        # Ports `lftools nexus release` (nexus/cmd.py release_staging_repos):
        # verify CLOSED state + rule failures, release via /staging/bulk/promote
        # (JSON), then poll activity until the release completes.
        elif [ "$INPUT_MODE" = "release" ]; then

            build_repo_ids
            echo "INFO: Release on ${#REPO_IDS[@]} repo(s)" \
                "(dry-run=${INPUT_DRY_RUN})"

            LAST_REPO_ID=""
            SUMMARY_ROWS=""
            for RID in "${REPO_IDS[@]}"; do
                ACTIVITY_URL="${STAGING_API}/repository/${RID}/activity"

                # Verify repo state before releasing (lftools parity)
                echo "INFO: Verifying staging repository ${RID}..."
                if ! ACTIVITY=$(curl -sf -u "$AUTH" \
                    -H "Accept: application/xml" "$ACTIVITY_URL"); then
                    echo "::error::Verification of ${RID} failed (activity)"
                    exit 1
                fi

                if echo "$ACTIVITY" | grep -q "ruleFailed" \
                    || echo "$ACTIVITY" | grep -q "repositoryCloseFailed"; then
                    echo "::error::One or more staging rules failed for ${RID}"
                    exit 1
                fi

                if echo "$ACTIVITY" | grep -q "repositoryReleased"; then
                    echo "INFO: Repository ${RID} already released; skipping"
                    SUMMARY_ROWS+="| \`${RID}\` | already released |"$'\n'
                    LAST_REPO_ID="${RID}"
                    continue
                fi

                if ! echo "$ACTIVITY" | grep -q "repositoryClosed"; then
                    echo "::error::Repository ${RID} is not in closed state"
                    exit 1
                fi
                echo "INFO: PASS: Repository ${RID} is in closed state"

                if [ "$INPUT_DRY_RUN" = "true" ]; then
                    echo "INFO: [dry-run] would release ${RID} (skipped)"
                    SUMMARY_ROWS+="| \`${RID}\` | verified (dry-run) |"$'\n'
                    LAST_REPO_ID="${RID}"
                    continue
                fi

                # Release via bulk/promote (matches lftools nexus release)
                echo "INFO: Releasing ${RID} via /staging/bulk/promote..."
                RELEASE_JSON="{\"data\":{\"stagedRepositoryIds\":[\"${RID}\"]}}"
                HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' \
                    -u "$AUTH" \
                    -H "Content-Type: application/json" \
                    -d "$RELEASE_JSON" \
                    "${STAGING_API}/bulk/promote")
                if [ "$HTTP_CODE" != "201" ]; then
                    echo "::error::Release of ${RID} failed (HTTP ${HTTP_CODE})"
                    exit 1
                fi
                echo "INFO: Nexus is now releasing ${RID}"

                # Poll activity until the release completes
                sleep 5
                WAIT_SECONDS=20
                WAIT_ITER=0
                MAX_ITER=90
                while true; do
                    POLL=$(curl -sf -u "$AUTH" \
                        -H "Accept: application/xml" "$ACTIVITY_URL" || true)
                    if echo "$POLL" | grep -q "repositoryReleased"; then
                        echo "INFO: Repository ${RID} released"
                        break
                    fi
                    WAIT_ITER=$((WAIT_ITER + 1))
                    if [ "$WAIT_ITER" -ge "$MAX_ITER" ]; then
                        echo "::error::Timed out waiting for ${RID} to release"
                        exit 1
                    fi
                    sleep "$WAIT_SECONDS"
                    ELAPSED=$((WAIT_SECONDS * WAIT_ITER))
                    echo "INFO: Still waiting... ${ELAPSED}s gone"
                done

                SUMMARY_ROWS+="| \`${RID}\` | released |"$'\n'
                LAST_REPO_ID="${RID}"
            done

            REPO_URL="${NEXUS_SERVER}/content/repositories/${LAST_REPO_ID}"
            echo "staging_repo_id=${LAST_REPO_ID}" >> "$GITHUB_OUTPUT"
            echo "staging_repo_url=${REPO_URL}" >> "$GITHUB_OUTPUT"

            {
                echo "## Nexus Staging Release ✅"
                echo ""
                echo "| Repo ID | Result |"
                echo "|---|---|"
                printf '%s' "${SUMMARY_ROWS}"
                echo ""
                echo "_dry-run: ${INPUT_DRY_RUN}_"
            } >> "$GITHUB_STEP_SUMMARY"

        # ─── CLOSE / DROP MODES (loop over repo list) ──────────────
        elif [ "$INPUT_MODE" = "close" ] || [ "$INPUT_MODE" = "drop" ]; then

            build_repo_ids

            case "$INPUT_MODE" in
                close) ACTION_VERB="Close"; API_OP="finish" ;;
                drop)  ACTION_VERB="Drop";  API_OP="drop"   ;;
            esac

            echo "INFO: ${ACTION_VERB} on ${#REPO_IDS[@]} repo(s)" \
                "(dry-run=${INPUT_DRY_RUN})"

            LAST_REPO_ID=""
            SUMMARY_ROWS=""
            for RID in "${REPO_IDS[@]}"; do
                echo "INFO: Verifying staging repository ${RID}..."
                if ! curl -sf -u "$AUTH" \
                    -H "Accept: application/xml" \
                    "${STAGING_API}/repository/${RID}" > /dev/null; then
                    echo "::error::Staging repository not found: ${RID}"
                    exit 1
                fi

                if [ "$INPUT_DRY_RUN" = "true" ]; then
                    echo "INFO: [dry-run] would ${API_OP} ${RID} (skipped)"
                    SUMMARY_ROWS+="| \`${RID}\` | verified (dry-run) |"$'\n'
                else
                    OP_XML="<promoteRequest><data>"
                    OP_XML+="<stagedRepositoryId>${RID}</stagedRepositoryId>"
                    OP_XML+="<description>"
                    OP_XML+="${ACTION_VERB}: ${INPUT_DESCRIPTION}"
                    OP_XML+="</description>"
                    OP_XML+="</data></promoteRequest>"
                    curl -sf -u "$AUTH" \
                        -H "Content-Type: application/xml" \
                        -d "$OP_XML" \
                        "${STAGING_API}/profiles/${PROFILE_ID}/${API_OP}"
                    echo "INFO: Staging repository ${RID} ${API_OP}d"
                    SUMMARY_ROWS+="| \`${RID}\` | ${API_OP}d |"$'\n'
                fi
                LAST_REPO_ID="${RID}"
            done

            if [ "$INPUT_MODE" = "drop" ]; then
                REPO_URL=""
            else
                REPO_URL="${NEXUS_SERVER}/content/repositories/${LAST_REPO_ID}"
            fi
            echo "staging_repo_id=${LAST_REPO_ID}" >> "$GITHUB_OUTPUT"
            echo "staging_repo_url=${REPO_URL}" >> "$GITHUB_OUTPUT"

            {
                echo "## Nexus Staging ${ACTION_VERB} ✅"
                echo ""
                echo "| Repo ID | Result |"
                echo "|---|---|"
                printf '%s' "${SUMMARY_ROWS}"
                echo ""
                echo "_dry-run: ${INPUT_DRY_RUN}_"
            } >> "$GITHUB_STEP_SUMMARY"
        fi

branding:
  icon: "box"
  color: "blue"
