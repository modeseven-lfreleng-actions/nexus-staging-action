---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2026 The Linux Foundation

# Action test/validation workflow
name: 'Test GitHub Action 🧪'

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

# Integration tests require a Nexus 2 server with staging profiles
# and corresponding credentials stored as repository secrets:
# NEXUS_SERVER = 'https://nexus.example.org'
# NEXUS_USERNAME -> Nexus service account username
# NEXUS_PASSWORD -> Nexus service account password
# STAGING_PROFILE_ID -> Nexus staging profile ID

jobs:
  ### Test input validation ###
  test-invalid-mode:
    name: 'Test: Invalid mode fails'
    runs-on: 'ubuntu-latest'
    permissions:
      contents: read
    timeout-minutes: 3
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d  # v2.16.1
        with:
          egress-policy: 'audit'

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: 'Run action with invalid mode (expect failure)'
        id: invalid-mode
        continue-on-error: true
        uses: ./
        with:
          nexus-server: 'https://nexus.example.org'
          nexus-username: 'test-user'
          nexus-password: 'test-pass'
          staging-profile-id: 'test-profile-id'
          mode: 'invalid'

      - name: 'Verify failure'
        shell: bash
        run: |
          # SPDX-License-Identifier: Apache-2.0
          set -euo pipefail
          if [ "${{ steps.invalid-mode.outcome }}" != "failure" ]; then
            echo "::error::Expected failure for invalid" \
              "mode, got: ${{ steps.invalid-mode.outcome }}"
            exit 1
          fi
          echo "PASS: Invalid mode correctly rejected"

  test-missing-m2repo:
    name: 'Test: Missing m2repo fails'
    runs-on: 'ubuntu-latest'
    permissions:
      contents: read
    timeout-minutes: 3
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d  # v2.16.1
        with:
          egress-policy: 'audit'

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: 'Run action with missing m2repo (expect failure)'
        id: missing-m2repo
        continue-on-error: true
        uses: ./
        with:
          nexus-server: 'https://nexus.example.org'
          nexus-username: 'test-user'
          nexus-password: 'test-pass'
          staging-profile-id: 'test-profile-id'
          mode: 'stage'
          m2repo-path: 'nonexistent-directory'

      - name: 'Verify failure'
        shell: bash
        run: |
          # SPDX-License-Identifier: Apache-2.0
          set -euo pipefail
          if [ "${{ steps.missing-m2repo.outcome }}" != "failure" ]; then
            echo "::error::Expected failure for missing" \
              "m2repo, got: ${{ steps.missing-m2repo.outcome }}"
            exit 1
          fi
          echo "PASS: Missing m2repo correctly rejected"

  test-missing-staging-repo-id:
    name: 'Test: Missing staging-repo-id fails'
    runs-on: 'ubuntu-latest'
    permissions:
      contents: read
    timeout-minutes: 3
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d  # v2.16.1
        with:
          egress-policy: 'audit'

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: 'Run action with missing staging-repo-id (expect failure)'
        id: missing-repo-id
        continue-on-error: true
        uses: ./
        with:
          nexus-server: 'https://nexus.example.org'
          nexus-username: 'test-user'
          nexus-password: 'test-pass'
          staging-profile-id: 'test-profile-id'
          # 'promote' is the deprecated alias for 'release'; this also
          # exercises that the alias still routes to the release validation.
          mode: 'promote'
          staging-repo-id: ''

      - name: 'Verify failure'
        shell: bash
        run: |
          # SPDX-License-Identifier: Apache-2.0
          set -euo pipefail
          if [ "${{ steps.missing-repo-id.outcome }}" != "failure" ]; then
            echo "::error::Expected failure for missing" \
              "staging-repo-id," \
              "got: ${{ steps.missing-repo-id.outcome }}"
            exit 1
          fi
          echo "PASS: Missing staging-repo-id correctly rejected"

  test-action-structure:
    name: 'Test: Action structure valid'
    runs-on: 'ubuntu-latest'
    permissions:
      contents: read
    timeout-minutes: 3
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d  # v2.16.1
        with:
          egress-policy: 'audit'

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: 'Validate action.yaml structure'
        shell: bash
        run: |
          # SPDX-License-Identifier: Apache-2.0
          set -euo pipefail

          echo "---> Validating action.yaml structure"

          # Check action.yaml exists
          if [ ! -f "action.yaml" ]; then
            echo "::error::action.yaml not found"
            exit 1
          fi

          # Verify required fields exist
          for field in name description inputs outputs runs; do
            if ! grep -q "^${field}:" action.yaml; then
              echo "::error::Missing required field: ${field}"
              exit 1
            fi
          done

          # Verify required inputs
          for input in nexus-server nexus-username nexus-password \
              staging-profile-id mode; do
            if ! grep -q "  ${input}:" action.yaml; then
              echo "::error::Missing required input: ${input}"
              exit 1
            fi
          done

          # Verify outputs
          for output in staging_repo_id staging_repo_url; do
            if ! grep -q "  ${output}:" action.yaml; then
              echo "::error::Missing required output: ${output}"
              exit 1
            fi
          done

          echo "PASS: Action structure validated"

  ### Mocked release flow (no live Nexus required) ###
  test-release-mock:
    name: 'Test: Release flow against mock Nexus'
    runs-on: 'ubuntu-latest'
    permissions:
      contents: read
    timeout-minutes: 5
    env:
      MOCK_LOG: '/tmp/nexus_requests.log'
      MOCK_PORT: '8089'
      MOCK_REPO_ID: 'mock-repo-1001'
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d  # v2.16.1
        with:
          egress-policy: 'audit'

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: 'Start mock Nexus server'
        shell: bash
        run: |
          # SPDX-License-Identifier: Apache-2.0
          set -euo pipefail
          python3 tests/mock_nexus.py > /tmp/mock.out 2>&1 &
          # Wait for the server to accept connections
          BASE="http://127.0.0.1:${MOCK_PORT}/service/local/staging"
          ACT="${BASE}/repository/${MOCK_REPO_ID}/activity"
          for _ in $(seq 1 20); do
            if curl -sf "${ACT}" > /dev/null 2>&1; then
              echo "INFO: mock-nexus is up"
              exit 0
            fi
            sleep 0.5
          done
          echo "::error::mock-nexus did not start"
          cat /tmp/mock.out || true
          exit 1

      - name: 'Run action in release mode against mock'
        id: release
        uses: ./
        with:
          nexus-server: 'http://127.0.0.1:8089'
          nexus-username: 'mock-user'
          nexus-password: 'mock-pass'
          staging-profile-id: 'mock-profile'
          mode: 'release'
          staging-repo-id: 'mock-repo-1001'

      - name: 'Assert request flow'
        shell: bash
        run: |
          # SPDX-License-Identifier: Apache-2.0
          set -euo pipefail

          echo "---> Recorded requests:"
          cat "${MOCK_LOG}"

          # 1. The action must release via the bulk/promote endpoint with the
          #    exact JSON payload lftools uses (NOT /profiles/{id}/promote).
          if ! grep -q "POST /service/local/staging/bulk/promote BODY" \
              "${MOCK_LOG}"; then
            echo "::error::release did not POST to /staging/bulk/promote"
            exit 1
          fi
          if ! grep -q '{"data":{"stagedRepositoryIds":\["mock-repo-1001"\]}}' \
              "${MOCK_LOG}"; then
            echo "::error::bulk/promote payload mismatch"
            exit 1
          fi
          if grep -q "/profiles/.*/promote" "${MOCK_LOG}"; then
            echo "::error::wrong endpoint /profiles/{id}/promote used"
            exit 1
          fi

          # 2. It must verify state (activity) before AND poll after release.
          ACTIVITY_HITS=$(grep -c "GET .*/activity" "${MOCK_LOG}")
          if [ "${ACTIVITY_HITS}" -lt 2 ]; then
            echo "::error::expected verify + poll on activity," \
              "saw ${ACTIVITY_HITS}"
            exit 1
          fi

          # 3. The action step itself must have succeeded.
          if [ "${{ steps.release.outcome }}" != "success" ]; then
            echo "::error::release step failed"
            exit 1
          fi

          echo "PASS: release flow matches lftools nexus release"
